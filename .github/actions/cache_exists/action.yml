---
name: "Checks whether a cache key already exists"
description: "Queries the GitHub Actions cache API for an exact key match, to skip save attempts that are certain to be rejected."
inputs:
  key:
    description: "The exact cache key to check for."
    required: true
outputs:
  exists:
    description: "'true' if a cache with this exact key is already stored."
    value: ${{ steps.check.outputs.exists }}
runs:
  using: "composite"
  steps:
    - name: "Check for an existing cache under this key"
      id: check
      shell: bash
      env:
        CACHE_KEY: ${{ inputs.key }}
        GH_TOKEN: ${{ github.token }}
      run: |
        exists=$(gh api "repos/${{ github.repository }}/actions/caches" -f key="${CACHE_KEY}" --jq '[.actions_caches[] | select(.key == env.CACHE_KEY)] | length > 0')
        echo "exists=${exists}" >> "${GITHUB_OUTPUT}"
