# Workflow template for triggering the Flink's test suite.

name: "Apache Flink Test Workflow Template"

on:
  workflow_call:
    inputs:
      workflow-caller-id:
        description: "The calling job's ID that can be used for build artifact names (that need to be different between different jobs of the same workflow)."
        default: ""
        type: string
      environment:
        description: "Defines environment variables for downstream scripts."
        required: true
        type: string
      jdk_version:
        description: "The Java version to use."
        default: 17
        type: number
    secrets:
      s3_bucket:
        required: false
      s3_access_key:
        required: false
      s3_secret_key:
        required: false

permissions: read-all

# Running logic within a container comes with challenges around file permissions (e.g. when trying
# to generate the hash for a certain set of files; see https://github.com/actions/cache/issues/753):
#
# The code is cloned into the runner's workspace /home/runner/work/ but outside the container.
# The runner's workspace folder is then mounted to /__w within the container. Files that were generated
# as part of the checkout will have the runner's user as the owner. Any files that are generated during
# the workflow execution will have the container's user as the owner (i.e. root). That can cause issues
# with actions that need to access the files of the checkout.
#
# We can work around this issue by copying the source code to a separate location (i.e. the container
# user's home folder). It's important to notice that any file that is subject to caching should still
# live in the mounted folder to ensure accessibility by the cache action.
env:
  MOUNTED_WORKING_DIR: /__w/flink/flink
  CONTAINER_LOCAL_WORKING_DIR: /root/flink
  # The following two variables are used by the utility scripts for creating
  # and unpacking the build artifacts.
  FLINK_ARTIFACT_DIR: /root/artifact-directory
  FLINK_ARTIFACT_FILENAME: flink_artifacts.tar.gz

  MAVEN_REPO_FOLDER: /root/.m2/repository
  MAVEN_ARGS: -Dmaven.repo.local=/root/.m2/repository
  # required by tools/azure-pipelines/cache_docker_images.sh
  DOCKER_IMAGES_CACHE_FOLDER: /root/.docker-cache

jobs:
  compile:
    name: "Compile"
    runs-on: ubuntu-24.04
    container:
      image: chesnay/flink-ci:java_8_11_17_21_maven_386_jammy
      # --init makes the process in the container being started as an init process which will clean up any daemon processes during shutdown
      # --privileged allows writing coredumps in docker (FLINK-16973)
      options: --init --privileged
    env:
      # timeout in minutes - this environment variable is required by uploading_watchdog.sh
      GHA_JOB_TIMEOUT: 240
      # GHA-only switch: build+install once here and ship Flink's Maven artifacts so test jobs
      # skip the per-stage rebuild. Azure does not set this and is unaffected.
      SHIP_PRECOMPILED: "true"
    outputs:
      stringified-workflow-name: ${{ steps.workflow-prep-step.outputs.stringified_value }}
    steps:
      - name: "Flink Checkout"
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: "Initialize job"
        uses: "./.github/actions/job_init"
        with:
          jdk_version: ${{ inputs.jdk_version }}
          maven_repo_folder: ${{ env.MAVEN_REPO_FOLDER }}
          source_directory: ${{ env.MOUNTED_WORKING_DIR }}
          target_directory: ${{ env.CONTAINER_LOCAL_WORKING_DIR }}
          # Only the compile job persists the Maven cache; fan-out jobs restore read-only.
          save_maven_cache: "true"

      - name: "Stringify workflow name"
        uses: "./.github/actions/stringify"
        id: workflow-prep-step
        with:
          value: "${{ github.workflow }}-${{ inputs.workflow-caller-id }}"

      - name: "Compile Flink"
        uses: "./.github/actions/run_mvn"
        timeout-minutes: ${{ fromJSON(env.GHA_JOB_TIMEOUT) }}
        with:
          working_directory: ${{ env.CONTAINER_LOCAL_WORKING_DIR }}
          # install (not test-compile) so jars are built and Flink artifacts are installed into
          # the local repo; create_build_artifact.sh then ships them (flink_m2.tar.gz) to test jobs.
          maven-parameters: "-T 1C install -DskipTests -Dflink.markBundledAsOptional=false -Dfast"
          env: "${{ inputs.environment }}"

      - name: "Collect build artifacts"
        working-directory: ${{ env.CONTAINER_LOCAL_WORKING_DIR }}
        run: |
          ./tools/azure-pipelines/create_build_artifact.sh

      - name: "Upload artifacts to make them available in downstream jobs"
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts-${{ steps.workflow-prep-step.outputs.stringified_value }}-${{ github.run_number }}
          path: ${{ env.FLINK_ARTIFACT_DIR }}/${{ env.FLINK_ARTIFACT_FILENAME }}
          if-no-files-found: error
          # use minimum here because we only need these artifacts to speed up the build
          retention-days: 1

      - name: "Upload Flink Maven artifacts for downstream test jobs"
        uses: actions/upload-artifact@v7
        with:
          name: flink-m2-${{ steps.workflow-prep-step.outputs.stringified_value }}-${{ github.run_number }}
          path: ${{ env.FLINK_ARTIFACT_DIR }}/flink_m2.tar.gz
          if-no-files-found: error
          retention-days: 1

      - name: "Upload Flink distribution for the e2e jobs"
        uses: actions/upload-artifact@v7
        with:
          name: flink-dist-${{ steps.workflow-prep-step.outputs.stringified_value }}-${{ github.run_number }}
          path: ${{ env.FLINK_ARTIFACT_DIR }}/flink_dist.tar.gz
          if-no-files-found: error
          retention-days: 1

  packaging:
    name: "Test packaging/licensing"
    needs: compile
    runs-on: ubuntu-24.04
    container:
      image: chesnay/flink-ci:java_8_11_17_21_maven_386_jammy
      # --init makes the process in the container being started as an init process which will clean up any daemon processes during shutdown
      # --privileged allows writing coredumps in docker (FLINK-16973)
      options: --init --privileged

    steps:
      - name: "Flink Checkout"
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          sparse-checkout: |
            .github
            .mvn
            .scalafmt.conf
            tools

      - name: "Initialize job"
        uses: "./.github/actions/job_init"
        with:
          jdk_version: ${{ inputs.jdk_version }}
          maven_repo_folder: ${{ env.MAVEN_REPO_FOLDER }}
          source_directory: ${{ env.MOUNTED_WORKING_DIR }}
          target_directory: ${{ env.CONTAINER_LOCAL_WORKING_DIR }}

      - name: "Download build artifacts from compile job"
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts-${{ needs.compile.outputs.stringified-workflow-name }}-${{ github.run_number }}
          path: ${{ env.FLINK_ARTIFACT_DIR }}

      - name: "Unpack build artifact"
        working-directory: ${{ env.CONTAINER_LOCAL_WORKING_DIR }}
        run: |
          ./tools/azure-pipelines/unpack_build_artifact.sh

      - name: "Test"
        working-directory: ${{ env.CONTAINER_LOCAL_WORKING_DIR }}
        run: |
          ${{ inputs.environment }} ./tools/ci/compile_ci.sh || exit $?

  test:
    name: "Test (module: ${{ matrix.module }})"
    needs: compile
    runs-on: ubuntu-24.04
    container:
      image: chesnay/flink-ci:java_8_11_17_21_maven_386_jammy
      # --init makes the process in the container being started as an init process which will clean up any daemon processes during shutdown
      # --privileged allows writing coredumps in docker (FLINK-16973)
      options: --init --privileged
      # the /mnt folder is a separate disk mounted to the host filesystem with more free disk space that can be utilized
      volumes:
        - /mnt:/root
    env:
      # timeout in minutes - this environment variable is required by uploading_watchdog.sh
      GHA_JOB_TIMEOUT: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: core
            stringified-module-name: core
          - module: python
            stringified-module-name: python
          - module: table
            stringified-module-name: table
          - module: connect
            stringified-module-name: connect
          - module: tests
            stringified-module-name: tests
          - module: misc
            stringified-module-name: misc

    steps:
      - name: "Flink Checkout"
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          sparse-checkout: |
            .github
            .mvn
            .scalafmt.conf
            tools

      - name: "Initialize job"
        uses: "./.github/actions/job_init"
        with:
          jdk_version: ${{ inputs.jdk_version }}
          maven_repo_folder: ${{ env.MAVEN_REPO_FOLDER }}
          source_directory: ${{ env.MOUNTED_WORKING_DIR }}
          target_directory: ${{ env.CONTAINER_LOCAL_WORKING_DIR }}

      - name: "Setup python"
        if: matrix.module == 'python'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: "Install Python header files"
        if: matrix.module == 'python'
        run: sudo apt-get update && sudo apt-get -y install python3-dev

      - name: "Set coredump pattern"
        working-directory: ${{ env.CONTAINER_LOCAL_WORKING_DIR }}
        run: sudo sysctl -w kernel.core_pattern=core.%p

      - name: "Download build artifacts from compile job"
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts-${{ needs.compile.outputs.stringified-workflow-name }}-${{ github.run_number }}
          path: ${{ env.FLINK_ARTIFACT_DIR }}

      - name: "Unpack build artifact"
        working-directory: ${{ env.CONTAINER_LOCAL_WORKING_DIR }}
        run: |
          ./tools/azure-pipelines/unpack_build_artifact.sh

      # Non-fatal: if the artifact is missing (evicted/upload failed), fall back to a full rebuild
      # in the test stage instead of failing the job (see next step).
      - name: "Download Flink Maven artifacts from compile job"
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: flink-m2-${{ needs.compile.outputs.stringified-workflow-name }}-${{ github.run_number }}
          path: ${{ env.FLINK_ARTIFACT_DIR }}

      - name: "Install pre-built Flink Maven artifacts (or fall back to a rebuild)"
        shell: bash
        run: |
          # Flink's own artifacts are excluded from the Maven cache and instead come from the
          # compile job. If present, extract them and let the test run skip the rebuild/install;
          # if absent, signal SKIP_REBUILD=false so test_controller.sh rebuilds Flink itself.
          if [ -f "${FLINK_ARTIFACT_DIR}/flink_m2.tar.gz" ]; then
            echo "Pre-built Flink artifacts found; extracting and skipping the rebuild."
            mkdir -p "${MAVEN_REPO_FOLDER}"
            tar --extract --gzip --file "${FLINK_ARTIFACT_DIR}/flink_m2.tar.gz" -C "${MAVEN_REPO_FOLDER}"
            echo "SKIP_REBUILD=true" >> "${GITHUB_ENV}"
          else
            echo "Pre-built Flink artifacts unavailable; falling back to a full rebuild."
            echo "SKIP_REBUILD=false" >> "${GITHUB_ENV}"
          fi

      # python and misc can't run from the Maven artifacts alone: python's lint-python.sh resolves
      # FLINK_HOME from build-target, and misc's yarn/dist tests consume the assembled distribution.
      # Restore it from the compile job (the same artifact the e2e job uses) so these two stages can
      # also skip the full Flink rebuild. Only downloaded for the stages that need it; the scoped
      # stages resolve everything from flink_m2.
      - name: "Download Flink distribution from compile job"
        if: ${{ matrix.module == 'python' || matrix.module == 'misc' }}
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: flink-dist-${{ needs.compile.outputs.stringified-workflow-name }}-${{ github.run_number }}
          path: ${{ env.FLINK_ARTIFACT_DIR }}

      - name: "Restore Flink distribution (python/misc)"
        if: ${{ matrix.module == 'python' || matrix.module == 'misc' }}
        working-directory: ${{ env.CONTAINER_LOCAL_WORKING_DIR }}
        shell: bash
        run: |
          # If the Maven artifacts were restored (SKIP_REBUILD=true) and the distribution is present,
          # restore flink-dist/target + the build-target symlink and signal DIST_PRECOMPILED=true so
          # test_controller.sh skips the full rebuild for these stages. Otherwise leave it false and
          # let test_controller.sh do a full build (which itself produces the distribution).
          if [ "${SKIP_REBUILD:-false}" == "true" ] && [ -f "${FLINK_ARTIFACT_DIR}/flink_dist.tar.gz" ]; then
            echo "Pre-built distribution found; restoring build-target and skipping the rebuild."
            tar --extract --gzip --file "${FLINK_ARTIFACT_DIR}/flink_dist.tar.gz"
            dist_dir="$(ls -d "$(pwd)"/flink-dist/target/flink-*-bin/flink-* 2>/dev/null | head -n1)"
            ln -snf "${dist_dir}" build-target
            echo "DIST_PRECOMPILED=true" >> "${GITHUB_ENV}"
          else
            echo "Pre-built distribution unavailable; falling back to a full rebuild."
            echo "DIST_PRECOMPILED=false" >> "${GITHUB_ENV}"
          fi

      - name: "Try loading Docker images from Cache"
        id: docker-cache
        uses: actions/cache@v5
        with:
          path: ${{ env.DOCKER_IMAGES_CACHE_FOLDER }}
          key: ${{ matrix.module }}-docker-${{ runner.os }}-${{ hashFiles('**/cache_docker_images.sh', '**/flink-test-utils-parent/**/DockerImageVersions.java') }}
          restore-keys: ${{ matrix.module }}-docker-${{ runner.os }}

      - name: "Load Docker images if not present in cache, yet"
        if: ${{ !cancelled() && !steps.docker-cache.cache.hit }}
        working-directory: ${{ env.CONTAINER_LOCAL_WORKING_DIR }}
        run: ./tools/azure-pipelines/cache_docker_images.sh load

      - name: "Create non-root user for test execution"
        run: |
          useradd -m -u 1001 flink
          echo "flink ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          for sock in /var/run/docker.sock /run/docker.sock; do
            if [ -e "$sock" ]; then
              chmod 666 "$sock"
              echo "Docker socket found at $sock"
            fi
          done
          mkdir -p \
            ${{ env.CONTAINER_LOCAL_WORKING_DIR }} \
            ${{ env.MAVEN_REPO_FOLDER }} \
            ${{ env.DOCKER_IMAGES_CACHE_FOLDER }}
          chown -R flink:flink ${{ env.CONTAINER_LOCAL_WORKING_DIR }}
          chown -R flink:flink ${{ env.MAVEN_REPO_FOLDER }}
          chown -R flink:flink ${{ env.DOCKER_IMAGES_CACHE_FOLDER }}

      - name: "Test - ${{ matrix.module }}"
        id: test-run
        working-directory: ${{ env.CONTAINER_LOCAL_WORKING_DIR }}
        env:
          IT_CASE_S3_BUCKET: ${{ secrets.s3_bucket }}
          IT_CASE_S3_ACCESS_KEY: ${{ secrets.s3_access_key }}
          IT_CASE_S3_SECRET_KEY: ${{ secrets.s3_secret_key }}
          DOCKER_HOST: unix:///var/run/docker.sock
        timeout-minutes: ${{ fromJSON(env.GHA_JOB_TIMEOUT) }}
        run: |
          runuser -u flink -- bash -c 'SKIP_REBUILD=${{ env.SKIP_REBUILD }} DIST_PRECOMPILED=${{ env.DIST_PRECOMPILED }} ${{ inputs.environment }} PROFILE="$PROFILE -Pgithub-actions" ./tools/azure-pipelines/uploading_watchdog.sh \
              ./tools/ci/test_controller.sh ${{ matrix.module }}'

      - name: "Post-build Disk Info"
        if: ${{ always() }}
        shell: bash
        run: df -h

      - name: "Top 15 biggest directories in terms of used disk space"
        if: ${{ always() }}
        shell: bash
        run: |
          du -ah --exclude="proc" -t100M . | sort -h -r | head -n 15

      - name: "Post-process build artifacts"
        working-directory: ${{ env.CONTAINER_LOCAL_WORKING_DIR }}
        run: find ${{ steps.test-run.outputs.debug-files-output-dir }} -type f -exec rename 's/[:<>|*?]/-/' {} \;

      - name: "Upload build artifacts"
        uses: actions/upload-artifact@v7
        if: ${{ failure() && steps.test-run.outputs.debug-files-output-dir != '' }}
        with:
          name: logs-test-${{ needs.compile.outputs.stringified-workflow-name }}-${{ github.run_number }}-${{ matrix.stringified-module-name }}-${{ steps.test-run.outputs.debug-files-name }}
          path: ${{ steps.test-run.outputs.debug-files-output-dir }}

      - name: "Save Docker images to cache"
        working-directory: ${{ env.CONTAINER_LOCAL_WORKING_DIR }}
        if: ${{ !cancelled() && (failure() || !steps.docker-cache.cache.hit) }}
        run: ./tools/azure-pipelines/cache_docker_images.sh save

  e2e:
    name: "E2E (group ${{ matrix.group }})"
    needs: compile
    # the end to end tests are not executed in Flink's CI Docker container due to problems when running Docker-in-Docker
    runs-on: ubuntu-24.04
    timeout-minutes: 310
    env:
      # timeout in minutes - this environment variable is required by uploading_watchdog.sh
      GHA_JOB_TIMEOUT: 310

      # Space-separated module paths to exclude from the scoped e2e build (matched as exact module
      # or path prefix). Add more here to skip them. Includes:
      #  - flink-tests-java17 / flink-architecture-tests: test modules e2e does not read;
      #  - flink-end-to-end-tests/flink-sql-gateway-test: an orphan module removed from the e2e
      #    reactor in FLINK-36437, so `-pl` would reject it ("not found in the reactor"); nothing
      #    in the nightly e2e run consumes it (run-nightly-tests.sh excludes it too).
      E2E_EXCLUDE_MODULES: "flink-tests-java17 flink-architecture-tests flink-end-to-end-tests/flink-sql-gateway-test"

      # required and forwarded as the cache-dir system property to DownloadCacheFactory
      # implementations in flink-end-to-end-tests/flink-end-to-end-tests-common
      E2E_CACHE_FOLDER: ${{ github.workspace }}/.e2e-cache
      # required by common_artifact_download_cacher.sh in flink-end-to-end-tests/test-scripts
      E2E_TARBALL_CACHE: ${{ github.workspace }}/.e2e-tar-cache

      # The following environment variables need to be overwritten here because the e2e tests do not
      # run in containers.
      MAVEN_REPO_FOLDER: ${{ github.workspace }}/.m2/repository
      MAVEN_ARGS: -Dmaven.repo.local=${{ github.workspace }}/.m2/repository
      FLINK_ARTIFACT_DIR: ${{ github.workspace }}
      DOCKER_IMAGES_CACHE_FOLDER: ${{ github.workspace }}/.docker-cache
    strategy:
      fail-fast: false
      matrix:
        group: [1, 2, 3, 4]

    steps:
      - name: "Flink Checkout"
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          sparse-checkout: |
            .github
            .mvn
            tools

      - name: "Initialize job"
        uses: "./.github/actions/job_init"
        with:
          jdk_version: ${{ inputs.jdk_version }}
          maven_repo_folder: ${{ env.MAVEN_REPO_FOLDER }}

      - name: "Setup python"
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: "Install missing packages"
        run: sudo apt-get install -y net-tools zip &&
             curl -sSL -o kubectl "https://dl.k8s.io/release/$(curl -sSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" &&
             sudo install -m 0755 kubectl /usr/local/bin/kubectl

      # netty-tcnative requires OpenSSL v1.0.0
      - name: "Install OpenSSL"
        run: |
          sudo apt-get install -y bc libapr1
          wget -r --no-parent -nd --accept=libssl1.0.0_*ubuntu5.*_amd64.deb http://security.ubuntu.com/ubuntu/pool/main/o/openssl1.0/
          sudo apt install ./libssl1.0.0_*.deb

      - name: "Download build artifacts from compile job"
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts-${{ needs.compile.outputs.stringified-workflow-name }}-${{ github.run_number }}
          path: ${{ env.FLINK_ARTIFACT_DIR }}

      - name: "Unpack build artifact"
        run: ./tools/azure-pipelines/unpack_build_artifact.sh

      # Non-fatal: both artifacts are needed for the scoped build; if either is missing we fall
      # back to a full Flink build below instead of failing the job.
      - name: "Download Flink Maven artifacts from compile job"
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: flink-m2-${{ needs.compile.outputs.stringified-workflow-name }}-${{ github.run_number }}
          path: ${{ env.FLINK_ARTIFACT_DIR }}

      - name: "Download Flink distribution from compile job"
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: flink-dist-${{ needs.compile.outputs.stringified-workflow-name }}-${{ github.run_number }}
          path: ${{ env.FLINK_ARTIFACT_DIR }}

      - name: "Install pre-built Flink artifacts and distribution (or fall back to a full build)"
        run: |
          # If both artifacts are present, install Flink's Maven artifacts into the local repo and
          # restore the distribution + build-target symlink, so only the test modules are built later.
          # If either is missing, signal a full build (which itself produces build-target).
          if [ -f "${FLINK_ARTIFACT_DIR}/flink_m2.tar.gz" ] && [ -f "${FLINK_ARTIFACT_DIR}/flink_dist.tar.gz" ]; then
            echo "Pre-built Flink artifacts and distribution found; using the scoped e2e build."
            mkdir -p "${MAVEN_REPO_FOLDER}"
            tar --extract --gzip --file "${FLINK_ARTIFACT_DIR}/flink_m2.tar.gz" -C "${MAVEN_REPO_FOLDER}"
            tar --extract --gzip --file "${FLINK_ARTIFACT_DIR}/flink_dist.tar.gz"
            dist_dir="$(ls -d "$(pwd)"/flink-dist/target/flink-*-bin/flink-* 2>/dev/null | head -n1)"
            ln -snf "${dist_dir}" build-target
            echo "E2E_PRECOMPILED=true" >> "${GITHUB_ENV}"
          else
            echo "Pre-built Flink artifacts/distribution unavailable; falling back to a full Flink build."
            echo "E2E_PRECOMPILED=false" >> "${GITHUB_ENV}"
          fi

      # the cache task does not create directories on a cache miss, and can later fail when trying to tar the directory if the test haven't created it
      # this may for example happen if a given directory is only used by a subset of tests, which are run in a different 'group'
      - name: "Create cache directories"
        run: |
          mkdir -p ${{ env.E2E_CACHE_FOLDER }}
          mkdir -p ${{ env.E2E_TARBALL_CACHE }}
          mkdir -p ${{ env.DOCKER_IMAGES_CACHE_FOLDER }}

      - name: "Load E2E files from Cache"
        uses: actions/cache@v5
        with:
          path: ${{ env.E2E_CACHE_FOLDER }}
          key: e2e-cache-${{ matrix.group }}-${{ hashFiles('**/flink-end-to-end-tests/**/*.java', '!**/avro/**') }}

      - name: "Load E2E artifacts from Cache"
        uses: actions/cache@v5
        with:
          path: ${{ env.E2E_TARBALL_CACHE }}
          key: e2e-artifact-cache-${{ matrix.group }}-${{ hashFiles('**/flink-end-to-end-tests/**/*.sh') }}
          restore-keys: e2e-artifact-cache-${{ matrix.group }}

      - name: "Try loading Docker images from Cache"
        id: docker-cache
        uses: actions/cache@v5
        with:
          path: ${{ env.DOCKER_IMAGES_CACHE_FOLDER }}
          key: e2e-${{ matrix.group }}-docker-${{ runner.os }}-${{ hashFiles('**/cache_docker_images.sh', '**/flink-test-utils-parent/**/DockerImageVersions.java') }}

      - name: "Load Docker images if not present in Cache, yet"
        if: ${{ !cancelled() && !steps.docker-cache.cache.hit }}
        run: ./tools/azure-pipelines/cache_docker_images.sh load

      - name: "Determine e2e build modules"
        if: ${{ env.E2E_PRECOMPILED == 'true' }}
        id: e2e-mods
        shell: bash
        run: |
          # Build every module whose path contains "test": the e2e test programs under
          # flink-end-to-end-tests and the test-utils they load by path (e.g.
          # flink-test-utils-parent/flink-table-filesystem-test-utils). Flink itself is resolved
          # from the pre-installed flink_m2, so only these modules are actually built. Modules in
          # E2E_EXCLUDE_MODULES are skipped (matched as exact module or path prefix).
          exclude_re=$(printf '%s\n' ${E2E_EXCLUDE_MODULES} | sed '/^$/d' | paste -sd'|' -)
          mods=$(find . -name pom.xml -not -path '*/target/*' | sed 's#/pom.xml##; s#^\./##' | grep -i test)
          if [ -n "${exclude_re}" ]; then
            mods=$(printf '%s\n' "${mods}" | grep -vE "^(${exclude_re})(\$|/)")
          fi
          mods=$(printf '%s\n' "${mods}" | paste -sd, -)
          echo "Excluding modules matching: ${exclude_re:-<none>}"
          echo "Building e2e modules: ${mods}"
          echo "modules=${mods}" >> "${GITHUB_OUTPUT}"

      - name: "Build e2e test programs (scoped; Flink from compile job)"
        if: ${{ env.E2E_PRECOMPILED == 'true' }}
        uses: "./.github/actions/run_mvn"
        with:
          # Flink itself is supplied by the compile job (flink_m2 in the local repo + flink_dist for
          # build-target), so build only the test/test-utils modules (-pl) rather than all of Flink.
          # Running from the repo root keeps the root profiles (e.g. skip-webui-build) available.
          maven-parameters: "install -DskipTests -Dfast $PROFILE -Pskip-webui-build -T1C -pl ${{ steps.e2e-mods.outputs.modules }}"
          env: "${{ inputs.environment }}"

      - name: "Build Flink (full; fallback when pre-built artifacts are unavailable)"
        if: ${{ env.E2E_PRECOMPILED != 'true' }}
        uses: "./.github/actions/run_mvn"
        with:
          # Fallback path: rebuild all of Flink, which also recreates the build-target distribution.
          maven-parameters: "install -DskipTests -Dfast $PROFILE -Pskip-webui-build -T1C"
          env: "${{ inputs.environment }}"

      - name: "Run E2E Tests"
        id: test-run
        env:
          IT_CASE_S3_BUCKET: ${{ secrets.s3_bucket }}
          IT_CASE_S3_ACCESS_KEY: ${{ secrets.s3_access_key }}
          IT_CASE_S3_SECRET_KEY: ${{ secrets.s3_secret_key }}
        timeout-minutes: ${{ fromJSON(env.GHA_JOB_TIMEOUT) }}
        run: |
          ${{ inputs.environment }} FLINK_DIR=`pwd`/build-target PROFILE="$PROFILE -Pgithub-actions" ./tools/azure-pipelines/uploading_watchdog.sh \
            flink-end-to-end-tests/run-nightly-tests.sh ${{ matrix.group }}

      - name: "Upload Logs"
        uses: actions/upload-artifact@v7
        if: ${{ failure() && steps.test-run.outputs.debug-files-output-dir != '' }}
        with:
          name: logs-e2e-${{ needs.compile.outputs.stringified-workflow-name }}-${{ github.run_number }}-${{ matrix.group }}-${{ steps.test-run.outputs.debug-files-name }}
          path: ${{ steps.test-run.outputs.debug-files-output-dir }}

      - name: "Save Docker images to Cache"
        if: ${{ !cancelled() && (failure() || !steps.docker-cache.cache.hit) }}
        run: ./tools/azure-pipelines/cache_docker_images.sh save
